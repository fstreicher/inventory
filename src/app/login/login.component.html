<div class="min-h-screen bg-gray-50 dark:bg-neutral-900 flex flex-col justify-center py-12 sm:px-6 lg:px-8 transition-colors duration-200">
  <div class="sm:mx-auto sm:w-full sm:max-w-md">
    <div class="text-center">
      <h1 class="text-3xl font-bold text-gray-900 dark:text-white transition-colors duration-200">📦</h1>
      <h2 class="mt-6 text-center text-3xl font-bold tracking-tight text-gray-900 dark:text-white transition-colors duration-200">
        Inventory Manager
      </h2>
      <p class="mt-2 text-center text-sm text-gray-600 dark:text-neutral-300 transition-colors duration-200">
        Sign in to manage your storage boxes and items
      </p>
    </div>
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
    <div class="bg-white dark:bg-neutral-800 py-8 px-4 shadow-sm rounded-lg sm:px-10 transition-colors duration-200">
      <div class="space-y-6">
        @if (errorMessage) {
          <div class="rounded-md bg-red-50 dark:bg-red-900 p-4 transition-colors duration-200">
            <div class="flex">
              <div class="flex-shrink-0">
                <div class="h-5 w-5 text-red-400 dark:text-red-300 transition-colors duration-200">
                  <ng-icon size="20" [svg]="ICONS.error" />
                </div>
              </div>
              <div class="ml-3">
                <h3 class="text-sm font-medium text-red-800 dark:text-red-200 transition-colors duration-200">
                  Sign in failed
                </h3>
                <div class="mt-2 text-sm text-red-700 dark:text-red-300 transition-colors duration-200">
                  <p>{{ errorMessage }}</p>
                </div>
              </div>
            </div>
          </div>
        }

        <div>
          <button
            class="w-full flex justify-center items-center px-4 py-3 border border-gray-300 dark:border-neutral-600 rounded-md shadow-sm bg-white dark:bg-neutral-700 text-sm font-medium text-gray-700 dark:text-neutral-200 hover:bg-gray-50 dark:hover:bg-neutral-600 focus:outline-none focus:ring-2 focus:ring-primary-500 dark:focus:ring-primary-400 disabled:opacity-50 disabled:cursor-not-allowed transition-colors duration-200"
            type="button"
            [disabled]="isLoading"
            (click)="signInWithGoogle()">
            @if (isLoading) {
              <div class="animate-spin -ml-1 mr-3 h-5 w-5 text-gray-500 dark:text-neutral-400 transition-colors duration-200">
                <ng-icon size="20" [svg]="ICONS.sync" />
              </div>
              Signing in...
            } @else {
              <svg class="w-5 h-5 mr-3" viewBox="0 0 24 24">
                <use href="#icon-google" />
              </svg>
              Continue with Google
            }
          </button>
        </div>

        <div class="text-center">
          <p class="text-xs text-gray-500 dark:text-neutral-400 transition-colors duration-200">
            By signing in, you agree to securely store your inventory data in your personal Firebase account.
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
