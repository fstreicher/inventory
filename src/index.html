<!doctype html>
<html lang="en">

  <head>
    <meta charset="utf-8">
    <title>Inventory Manager</title>
    <base href="/">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <link
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📦</text></svg>"
      rel="icon">

    <!-- PWA Manifest -->
    <link href="manifest.json" rel="manifest">
    <meta content="#2563eb" name="theme-color">

    <!-- PWA Meta Tags -->
    <meta content="yes" name="mobile-web-app-capable">
    <meta content="yes" name="apple-mobile-web-app-capable">
    <meta content="default" name="apple-mobile-web-app-status-bar-style">
    <meta content="Inventory" name="apple-mobile-web-app-title">
    <link
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📦</text></svg>"
      rel="apple-touch-icon">

    <!-- Description for offline capability -->
    <meta content="Manage your boxes and items inventory, even offline in the basement" name="description">

    <!-- Dark mode initialization script - runs before page render to prevent flash -->
    <script>
      (function() {
        const theme = localStorage.getItem('theme');
        const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

        if (theme === 'dark' || (!theme && systemPrefersDark)) {
          document.documentElement.classList.add('dark');
        }
      })();

    </script>
  </head>

  <body>
    <!-- SVG Sprite - Hidden icons for reuse -->
    <svg style="display: none;" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- Box Icon -->
        <g id="icon-box">
          <path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" stroke-linecap="round" stroke-linejoin="round"
            stroke-width="2" />
        </g>

        <!-- Google Icon -->
        <g id="icon-google">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
            fill="#4285F4" />
          <path
            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
            fill="#34A853" />
          <path
            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
            fill="#FBBC05" />
          <path
            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
            fill="#EA4335" />
        </g>

        <!-- REPLACED WITH NG-ICONS: Document Icon - now using matDescription -->
        <g id="icon-document">
          <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"
            stroke-linecap="round" stroke-linejoin="round" stroke-width="2" />
        </g>
      </defs>
    </svg>

    <inv-root></inv-root>
  </body>

</html>
