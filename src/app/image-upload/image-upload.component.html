<div class="space-y-4">
  <label class="block text-sm font-medium text-gray-700 dark:text-neutral-300">
    Item Photo
  </label>

  @if (displayImageUrl) {
    <!-- Display existing image -->
    <div class="relative">
      <img
        alt="Item photo"
        class="w-full max-w-sm h-48 object-cover rounded-lg border border-gray-300 dark:border-neutral-600"
        [src]="displayImageUrl">

      @if (!isUploading()) {
        <button
          class="absolute top-2 right-2 w-8 h-8 flex items-center justify-center bg-red-600 text-white rounded-full hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-red-900"
          type="button"
          (click)="onRemoveImage()">
          <ng-icon size="1rem" [svg]="ICONS.close" />
          <span class="sr-only">Remove image</span>
        </button>
      }
    </div>
  } @else {
    <!-- Upload interface -->
    <div class="border-2 border-dashed border-gray-300 dark:border-neutral-600 rounded-lg p-6 text-center">
      @if (isUploading()) {
        <div class="flex flex-col items-center">
          <ng-icon 
            class="animate-spin text-primary-600 mb-2"
            size="2rem" 
            [svg]="ICONS.spinner" />
          <p class="text-sm text-gray-600 dark:text-neutral-400">Uploading image...</p>
        </div>
      } @else {
        <div class="space-y-4">
          <div class="flex justify-center">
            <ng-icon 
              class="text-gray-400 dark:text-neutral-500"
              size="3rem" 
              [svg]="ICONS.image" />
          </div>

          <div>
            <p class="text-sm text-gray-600 dark:text-neutral-400 mb-3">
              Add a photo to help identify this item
            </p>

            <div class="flex flex-col sm:flex-row gap-2 justify-center">
              <button
                class="inline-flex items-center px-3 py-2 border border-gray-300 dark:border-neutral-600 rounded-md shadow-sm text-sm font-medium text-gray-700 dark:text-neutral-200 bg-white dark:bg-neutral-700 hover:bg-gray-50 dark:hover:bg-neutral-600 focus:outline-none focus:ring-2 focus:ring-primary-500"
                type="button"
                (click)="onCameraClick()">
                <ng-icon 
                  class="mr-2"
                  size="1rem" 
                  [svg]="ICONS.camera" />
                Take Photo
              </button>

              <button
                class="inline-flex items-center px-3 py-2 border border-gray-300 dark:border-neutral-600 rounded-md shadow-sm text-sm font-medium text-gray-700 dark:text-neutral-200 bg-white dark:bg-neutral-700 hover:bg-gray-50 dark:hover:bg-neutral-600 focus:outline-none focus:ring-2 focus:ring-primary-500"
                type="button"
                (click)="onGalleryClick()">
                <ng-icon 
                  class="mr-2"
                  size="1rem" 
                  [svg]="ICONS.image" />
                Choose from Gallery
              </button>
            </div>
          </div>
        </div>
      }
    </div>
  }

  @if (uploadError()) {
    <div class="rounded-md bg-red-50 dark:bg-red-900/50 p-4">
      <div class="flex">
        <div class="flex-shrink-0">
          <ng-icon 
            class="text-red-400"
            size="1.25rem" 
            [svg]="ICONS.warning" />
        </div>
        <div class="ml-3">
          <p class="text-sm text-red-800 dark:text-red-200">{{ uploadError() }}</p>
        </div>
      </div>
    </div>
  }

  <p class="text-xs text-gray-500 dark:text-neutral-400">
    Images will be resized automatically for optimal storage. Supported formats: JPG, PNG, GIF.
  </p>
</div>
