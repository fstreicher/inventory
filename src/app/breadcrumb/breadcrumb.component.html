<nav aria-label="Breadcrumb" class="flex mb-4 min-w-0">
  <ol class="flex items-center space-x-4 min-w-0 flex-1">
    <!-- Home breadcrumb -->
    <li class="flex-shrink-0">
      <a
        class="text-gray-400 dark:text-neutral-500 hover:text-gray-500 dark:hover:text-neutral-400 cursor-pointer"
        routerLink="/boxes">
        <ng-icon
          class="translate-0.5"
          size="1.25rem"
          [svg]="ICONS.home" />
        <span class="sr-only">All Boxes</span>
      </a>
    </li>

    <!-- Dynamic breadcrumb items -->
    @for (item of items; track $index) {
      <li class="min-w-0" [class.flex-1]="$index === items.length - 1">
        <div class="flex items-center min-w-0">
          <div class="text-gray-500 dark:text-neutral-400">
            <ng-icon
              class="translate-0.5"
              size="1.125rem"
              [svg]="ICONS.chevronRight" />
          </div>
          
          @if (item.link && !item.isCurrentPage) {
            <a
              class="ml-4 text-sm font-medium text-gray-500 dark:text-neutral-400 hover:text-gray-700 dark:hover:text-neutral-300 cursor-pointer truncate min-w-0"
              [routerLink]="item.link">
              {{ item.label }}
            </a>
          } @else {
            <span
              class="ml-4 text-sm font-medium text-gray-500 dark:text-neutral-400 truncate min-w-0"
              [class.dark:text-white]="item.isCurrentPage"
              [class.text-gray-900]="item.isCurrentPage">
              {{ item.label }}
            </span>
          }
        </div>
      </li>
    }
  </ol>
</nav>
