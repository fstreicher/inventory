<div class="min-h-screen bg-gray-50">
  <!-- Navigation Bar -->
  <nav class="bg-white shadow-lg border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16">
        <div class="flex items-center">
          <div class="flex-shrink-0">
            <h1 class="text-lg sm:text-xl font-bold text-gray-900">📦 Inventory Manager</h1>
          </div>
          <!-- Desktop Navigation -->
          <div class="hidden md:ml-10 md:flex md:items-baseline md:space-x-4">
            <a routerLink="/boxes" 
               routerLinkActive="bg-blue-100 text-blue-700" 
               class="text-gray-500 hover:text-gray-700 hover:bg-gray-100 px-3 py-2 rounded-md text-sm font-medium transition-colors duration-200">
              All Boxes
            </a>
            <a routerLink="/search" 
               routerLinkActive="bg-blue-100 text-blue-700" 
               class="text-gray-500 hover:text-gray-700 hover:bg-gray-100 px-3 py-2 rounded-md text-sm font-medium transition-colors duration-200">
              Search Items
            </a>
            <a routerLink="/add-box" 
               routerLinkActive="bg-blue-100 text-blue-700" 
               class="text-gray-500 hover:text-gray-700 hover:bg-gray-100 px-3 py-2 rounded-md text-sm font-medium transition-colors duration-200">
              Add Box
            </a>
          </div>
        </div>
        
        <!-- Mobile menu button -->
        <div class="md:hidden">
          <button 
            type="button"
            (click)="toggleMobileMenu()"
            class="inline-flex items-center justify-center p-2 rounded-md text-gray-400 hover:text-gray-500 hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-inset focus:ring-blue-500"
            [attr.aria-expanded]="isMobileMenuOpen">
            <span class="sr-only">Open main menu</span>
            @if (!isMobileMenuOpen) {
              <!-- Hamburger icon -->
              <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
              </svg>
            } @else {
              <!-- Close icon -->
              <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
              </svg>
            }
          </button>
        </div>
      </div>
      
      <!-- Mobile Navigation Menu -->
      @if (isMobileMenuOpen) {
        <div class="md:hidden">
          <div class="px-2 pt-2 pb-3 space-y-1 sm:px-3 border-t border-gray-200">
            <a routerLink="/boxes" 
               routerLinkActive="bg-blue-100 text-blue-700" 
               (click)="closeMobileMenu()"
               class="text-gray-500 hover:text-gray-700 hover:bg-gray-100 block px-3 py-2 rounded-md text-base font-medium transition-colors duration-200">
              All Boxes
            </a>
            <a routerLink="/search" 
               routerLinkActive="bg-blue-100 text-blue-700" 
               (click)="closeMobileMenu()"
               class="text-gray-500 hover:text-gray-700 hover:bg-gray-100 block px-3 py-2 rounded-md text-base font-medium transition-colors duration-200">
              Search Items
            </a>
            <a routerLink="/add-box" 
               routerLinkActive="bg-blue-100 text-blue-700" 
               (click)="closeMobileMenu()"
               class="text-gray-500 hover:text-gray-700 hover:bg-gray-100 block px-3 py-2 rounded-md text-base font-medium transition-colors duration-200">
              Add Box
            </a>
          </div>
        </div>
      }
    </div>
  </nav>

  <!-- Main Content -->
  <main class="max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8">
    <router-outlet></router-outlet>
  </main>
</div>
